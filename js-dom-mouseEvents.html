<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Dom Mouse Events </title>
    <style>

        .div{
            width: 300px;
            height: 300px;
            background-color: antiquewhite;
            font-size: 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main{
            display: flex;
            justify-content: center;
            align-items: center;
            gap:50px;
        }
    </style>
</head>
<body>

<main>
<h1 id="h1"></h1>
<div class= "div" id="div">
    box1
</div>

<div class= "div" id="div2">
    box2
</div>
</main>
<button id="btn">button</button>

    <script>
        const btn = document.querySelector('#btn');
        const div = document.querySelector('#div');
        const div2 = document.getElementById('div2')

    // Click Event
    function clicked(){
        div.textContent = "clicked 😀";
        div.style.backgroundColor = "LightGreen";
        
    }
    div.addEventListener('click', clicked);

    // Dbl Click Event
    function dbclicked(){
        div.innerHTML = "Double<br>Clicked 😀";
        div.style.backgroundColor = "LightGray";
    }
    div.addEventListener('dblclick', dbclicked);


    // Mouse Over Event
    function mouseOver(){
        div.innerHTML = "Mouse Over <br> Active😎";
        div.style.backgroundColor = "LightBlue";
        div.style.color = "white";
    }
    div.addEventListener('mouseover', mouseOver);

    // Mouse Out Event
    function mouseOut(){
        div.textContent = "box1";
        div.style.backgroundColor = "antiquewhite";
        div.style.color = "black";
    }
    div.addEventListener('mouseout', mouseOut);

    // MouseDown Event

    function mouseDown(){
        div.style.backgroundColor = "blue";
        div.textContent = "Mouse Down act."

    }
    div.addEventListener('mousedown',mouseDown);


    // Mouse Up Event
    function mouseUp(){
        
        console.log("mouseup");
    }
    div.addEventListener('mouseup', mouseUp);


    // ---------- KEY  EVENTS ---------- // 
    
    // Keydown Event
     function keyDown(eventt){
        if(eventt.key == 'Enter'){
            document.body.style.backgroundColor = "Pink";
        }
        else if(eventt.key == "CapsLock"){
            document.body.style.backgroundColor = "white";
        }
    }
    document.addEventListener('keydown', keyDown);

    
    // Keyup Event
/*
    function keyUp(eventt){
        console.log(`Event KeyUp : ${eventt.key}`);
    }
    document.addEventListener('keyup', keyUp); */



    // Function Subject 

    

</script>
</body>
</html>
