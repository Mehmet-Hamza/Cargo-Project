                const Teslimat_sure = (Teslimat_suresi) => (Teslimat_suresi === "Hizli Teslimat") ? 1 : 3;
                standart_teslim_suresi = Teslimat_sure(Teslimat_suresi);
                kargo_ekstra_ücretlendirme += (standart_teslim_suresi === 1) ? 50 : 0;
                 
            }
                  
            // YURTİÇİ KARGO
                if(kargoSirketi =="Yurtiçi Kargo"){
                    FİYAT = (ToplamKG >= 5) ? 120 : 70;
                }
            
            // ARAS KARGO
                else if(kargoSirketi == "Aras Kargo"){
                    FİYAT = (ToplamKG < 5) ? 65 : 90;
                }
            
            // DHL KARGO
                else if(kargoSirketi == "DHL Kargo"){
                
                    // let dhl = Number(prompt("Kargonuz Yurtiçi ise (1) , Yurtdışı ise (2) Tuşlayın"));

                        // DHL YURTİÇİ
                        if(dhl == 1){
                            FİYAT = (ToplamKG >= 5) ? 250 : 165;

                        }

                        // DHL YURTDIŞI
                        else if(dhl == 2){
                            let abd = prompt("Kargonuz Amerika'ya gidecekmi. evet / hayır");

                            // USA
                            if(abd == "evet"){
                            FİYAT = (ToplamKG >= 5) ? 3500 : 2500;
                            }
                      
                            // OTHER (Europe , Asia , Africa)
                            else if(abd =="hayır"){
                            FİYAT = (ToplamKG >= 5) ? 2000 : 1400;
                
                            }
                            else{

                            }

                }
            }


            // HATA MESAJLARI
             else if(kargoSirketi === ""){

            } 
             else if(kargoSirketi !== Number){

            }
 
                

            // Fiş - 4
            let toplamOdenecek;
                
             
            // Ücret Hesaplamalar

            if((kargoSirketi === "DHL Kargo") && (dhl === 2)){
                toplamOdenecek = FİYAT;
                toplamOdenecek += kargo_ekstra_ücretlendirme
            }
            
            // Yurtiçi Kargoları İçin Fiyatlandırma
            else if((kargoSirketi !== "DHL Kargo") || (dhl !== 2)){
                toplamOdenecek = kargoAdet * FİYAT ;

                    if((toplamOdenecek > 0) && (kargoSirketi !== "") && (isNaN(kargoSirketi))){
